<!DOCTYPE html>
<html>
<head>
    <title>Teste API Direto</title>
</head>
<body>
    <h1>Teste API Vercel</h1>
    <button onclick="testAPI()">Testar API</button>
    <div id="result"></div>

    <script>
        async function testAPI() {
            const result = document.getElementById('result');
            result.innerHTML = 'Testando...';
            
            try {
                console.log('Testando API...');
                
                const response = await fetch('https://profile-chat.vercel.app/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: 'llama-3.1-8b-instant',
                        messages: [
                            {
                                role: 'user',
                                content: 'Diga apenas "Funcionando!"'
                            }
                        ],
                        max_tokens: 50
                    })
                });
                
                console.log('Response status:', response.status);
                console.log('Response headers:', response.headers);
                
                if (!response.ok) {
                    const errorText = await response.text();
                    console.error('Error response:', errorText);
                    throw new Error(`Erro ${response.status}: ${errorText}`);
                }
                
                const data = await response.json();
                console.log('Success data:', data);
                
                result.innerHTML = `<strong>Sucesso!</strong><br>Resposta: ${data.choices[0].message.content}`;
                
            } catch (error) {
                console.error('Erro completo:', error);
                result.innerHTML = `<strong>Erro:</strong> ${error.message}`;
            }
        }
    </script>
</body>
</html>
