<!DOCTYPE html>
<html>
<head>
    <title>Teste API Groq</title>
</head>
<body>
    <h1>Teste API Groq</h1>
    <button onclick="testAPI()">Testar API</button>
    <div id="result"></div>

    <script>
        async function testAPI() {
            const result = document.getElementById('result');
            result.innerHTML = 'Testando...';
            
            try {
                // Carrega configuração
                const configResponse = await fetch('./botData/api-config.json');
                const config = await configResponse.json();
                
                console.log('Config carregada:', config);
                
                // Testa API direta
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${config.groq.apiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: 'llama-3.1-8b-instant',
                        messages: [
                            { role: 'user', content: 'Diga apenas "API funcionando!"' }
                        ],
                        max_tokens: 50
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`Erro ${response.status}: ${await response.text()}`);
                }
                
                const data = await response.json();
                result.innerHTML = `<strong>Sucesso!</strong><br>Resposta: ${data.choices[0].message.content}`;
                
            } catch (error) {
                result.innerHTML = `<strong>Erro:</strong> ${error.message}`;
                console.error('Erro:', error);
            }
        }
    </script>
</body>
</html>
